version: "3.8"

services:
  fjg-gateway:
    image: python:3.11-slim
    container_name: fjg-gateway
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
      - ./static:/app/static:ro
    environment:
      - PROVIDERS_FILE=/app/src/providers.json
      - FJG_STATE_DIR=/app/data
      - PORT=8088
    working_dir: /app/src
    command: python3 gateway.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
